name: E-posta Kuyruğunu Gönder

# Periyodik tarama YOK. Bunun yerine, client tarafında bir mail
# `mailOutbox`'a 'pending' olarak yazıldığı an (bkz. src/lib/mailOutbox.ts ->
# triggerMailWorker), tarayıcıdan GitHub API'sine atılan "repository_dispatch"
# isteğiyle bu workflow ANINDA tetiklenir.
# "workflow_dispatch" ile GitHub Actions sekmesinden elle de tetiklenebilir
# (ör. tetikleme isteği bir sebeple ulaşmazsa, kuyrukta kalan mailleri
# elle göndermek için).
on:
  repository_dispatch:
    types: [mail-queued]
  workflow_dispatch:

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: firebase-admin kur
        run: npm install firebase-admin --no-save

      - name: E-posta kuyruğunu işle
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          APP_RESET_PASSWORD_URL: ${{ secrets.APP_RESET_PASSWORD_URL }}
          APP_LOGO_URL: ${{ secrets.APP_LOGO_URL }}
        run: node scripts/send-mail-outbox.mjs
