name: Haftalık Özet E-postasını Kuyruğa Al

# Her Pazartesi 06:00 UTC (TR saatiyle 09:00) çalışır.
# Ayrıca "workflow_dispatch" ile GitHub Actions sekmesinden elle de tetiklenebilir.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  queue-weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: firebase-admin kur
        run: npm install firebase-admin --no-save

      - name: Haftalık özetleri kuyruğa al
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          APP_DASHBOARD_URL: ${{ secrets.APP_DASHBOARD_URL }}
        run: node scripts/send-weekly-summary.mjs

      # Bu mailler tarayıcıdan değil, doğrudan bu workflow tarafından sunucu
      # tarafında kuyruğa alındığı için src/lib/mailOutbox.ts'deki anlık
      # tetikleme (repository_dispatch) burada devreye girmez. Bu yüzden
      # gönderim scriptini aynı job içinde art arda çalıştırıyoruz.
      - name: Kuyruğa alınan haftalık özetleri gönder
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          APP_RESET_PASSWORD_URL: ${{ secrets.APP_RESET_PASSWORD_URL }}
          APP_LOGO_URL: ${{ secrets.APP_LOGO_URL }}
        run: node scripts/send-mail-outbox.mjs
